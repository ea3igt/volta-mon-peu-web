name: Actualitza dades i publica el web

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5,15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  prepara:
    runs-on: ubuntu-latest
    steps:
      - name: Recupera el projecte
        uses: actions/checkout@v7

      - name: Prepara Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Recalcula les estadístiques dels GPX
        run: python scripts/update_data.py

      - name: Desa les dades noves al repositori
        run: |
          if git diff --quiet -- data/stats.json data/geocode-cache.json; then
            echo "No hi ha dades noves."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/stats.json data/geocode-cache.json
            git commit -m "Actualitza les dades del viatge"
            git push
          fi

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepara els fitxers del web
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  publica:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: prepara
    steps:
      - name: Publica a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

